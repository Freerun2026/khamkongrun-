<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครวิ่ง - Kham Kong Run 2026 #5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-orange-50 py-10 font-sans">

    <div class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-lg border-t-8 border-orange-500">
        
        <img src="poster.jpg" alt="Kham Kong Run Poster" class="w-full h-auto rounded-t-xl mb-6 shadow-md">
        
        <h1 class="text-3xl md:text-4xl font-extrabold text-center text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-red-600 mb-2">Kham Kong Run 2026 #5</h1>
        <p class="text-center text-gray-600 mb-8 font-semibold text-lg">เดิน วิ่ง ข้ามฝั่งโขง (เชียงของ - ห้วยทราย)</p>
        
        <form id="regForm">
            
            <h2 class="text-xl font-bold mb-4 text-orange-800 border-b-2 border-orange-200 pb-2"><i class="fas fa-user mr-2"></i>1. ข้อมูลส่วนตัว</h2>
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2 font-medium">เลขประจำตัวประชาชน (13 หลัก) <span class="text-red-500">*</span></label>
                <input type="text" id="national_id" name="national_id" maxlength="13" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" required>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-gray-700 mb-2 font-medium">ชื่อ-นามสกุล <span class="text-red-500">*</span></label>
                    <input type="text" id="full_name" name="full_name" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" required>
                </div>
                <div>
                    <label class="block text-gray-700 mb-2 font-medium">เบอร์โทรศัพท์ <span class="text-red-500">*</span></label>
                    <input type="tel" id="phone" name="phone" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" required>
                </div>
            </div>

            <h2 class="text-xl font-bold mt-8 mb-4 text-orange-800 border-b-2 border-orange-200 pb-2"><i class="fas fa-running mr-2"></i>2. เลือกระยะทางและแพ็กเกจ</h2>
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2 font-medium">ระยะทาง <span class="text-red-500">*</span></label>
                <select id="distance" name="distance" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" required>
                    <option value="">-- กรุณาเลือกระยะทาง --</option>
                    <option value="5k">5 กิโลเมตร (ปล่อยตัว 06:00 น.)</option>
                    <option value="10k">10 กิโลเมตร (ปล่อยตัว 05:30 น.)</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2 font-medium">ประเภทการสมัคร <span class="text-red-500">*</span></label>
                <div class="space-y-3">
                    <label class="flex items-start p-4 border rounded-lg cursor-pointer hover:bg-orange-50">
                        <input type="radio" name="package_type" value="free" class="mt-1 mr-3 w-5 h-5 text-orange-600" required>
                        <div>
                            <span class="block font-bold text-gray-800">สมัครฟรี (ยอดโอน 200 บาท)</span>
                            <span class="block text-sm text-gray-500">ค่าประกัน 200 บาท (ได้คืนวันงาน) | ได้ Bib, ลุ้นรางวัล, อาหาร</span>
                        </div>
                    </label>
                    <label class="flex items-start p-4 border rounded-lg cursor-pointer hover:bg-orange-50">
                        <input type="radio" name="package_type" value="premium" class="mt-1 mr-3 w-5 h-5 text-orange-600">
                        <div>
                            <span class="block font-bold text-gray-800">รับเสื้อและเหรียญ 199 บาท (ยอดโอน 399 บาท)</span>
                            <span class="block text-sm text-gray-500">ค่าสมัคร 199 + ประกัน 200 | ได้ของครบทุกอย่าง พร้อมคูปอง 100 บาท</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-gray-700 mb-2 font-medium">ไซส์เสื้อ (เฉพาะแพ็กเกจ 199 บาท)</label>
                <select id="shirt_size" name="shirt_size" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 disabled:bg-gray-100 disabled:text-gray-400">
                    <option value="-">-- ไม่รับเสื้อ หรือ เลือกไซส์ --</option>
                    <option value="S">S (รอบอก 36")</option>
                    <option value="M">M (รอบอก 38")</option>
                    <option value="L">L (รอบอก 40")</option>
                    <option value="XL">XL (รอบอก 42")</option>
                    <option value="2XL">2XL (รอบอก 44")</option>
                </select>
            </div>

            <h2 class="text-xl font-bold mt-8 mb-4 text-orange-800 border-b-2 border-orange-200 pb-2"><i class="fas fa-money-bill-wave mr-2"></i>3. ชำระเงินและแนบสลิป</h2>
            
            <div class="bg-orange-100 p-6 rounded-lg mb-6 border border-orange-200 text-center">
                <p class="font-bold text-lg text-gray-800 mb-2">บัญชีโอนเงิน: ธนาคารกรุงไทย</p>
                <p class="text-2xl font-extrabold text-orange-600 mb-1">XXX-X-XXXXX-X</p>
                <p class="text-gray-700 mb-4">ชื่อบัญชี: โครงการ Kham Kong Run</p>
                
                <div class="text-left bg-white p-4 rounded mt-4">
                    <label class="block text-gray-700 mb-2 font-medium">แนบรูปภาพสลิปโอนเงิน <span class="text-red-500">*</span></label>
                    <input type="file" id="slip_image" accept="image/*" class="w-full text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100" required>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-orange-500 to-red-600 text-white font-bold py-4 rounded-xl hover:from-orange-600 hover:to-red-700 transition duration-300 text-xl shadow-lg transform hover:-translate-y-1">
                ยืนยันการสมัครและส่งข้อมูล
            </button>
            <div class="mt-8 pt-6 border-t-2 border-orange-100 text-center">
    <p class="text-gray-600 mb-3 font-medium">มีข้อสงสัยหรือพบปัญหาในการสมัคร? ติดต่อเราได้ที่</p>
    <a href="https://business.facebook.com/latest/inbox/all/?nav_ref=manage_page_ap_plus_inbox_message_button&asset_id=113771001780393" 
       target="_blank" 
       class="inline-flex items-center justify-center bg-[#1877F2] hover:bg-[#166FE5] text-white font-semibold px-6 py-3 rounded-xl transition duration-300 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
        <i class="fab fa-facebook-square text-2xl mr-2"></i>
        <span>ติดต่อสอบถามทาง Facebook Inbox</span>
    </a>
</div>
        </form>
    </div>

    <script>
        // ⚠️ เอาลิงก์ Web App URL อันใหม่มาใส่ตรงนี้นะครับ ⚠️
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxP0gtZ0qSr15hv929O8UEr6jOJ65uX7QM_rwKyjwtHexm9fKl4gANb3raY-72tyIL8/exec';

        // ระบบล็อก-ปลดล็อกไซส์เสื้ออัตโนมัติ
        const packageRadios = document.querySelectorAll('input[name="package_type"]');
        const shirtSelect = document.getElementById('shirt_size');

        packageRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (this.value === 'free') {
                    shirtSelect.value = '-';
                    shirtSelect.disabled = true; 
                } else {
                    shirtSelect.disabled = false; 
                }
            });
        });

        // ระบบส่งข้อมูล
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> กำลังอัปโหลดข้อมูล...';
            btn.disabled = true;
            btn.classList.add('opacity-70');

            const file = document.getElementById('slip_image').files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const base64String = event.target.result;
                
                const payload = {
                    national_id: document.getElementById('national_id').value,
                    full_name: document.getElementById('full_name').value,
                    phone: document.getElementById('phone').value,
                    distance: document.getElementById('distance').value,
                    package_type: document.querySelector('input[name="package_type"]:checked').value,
                    shirt_size: document.getElementById('shirt_size').value,
                    slip_base64: base64String
                };

                fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    alert('สมัครและอัปโหลดสลิปสำเร็จ! ขอบคุณที่ร่วมกิจกรรมครับ');
                    document.getElementById('regForm').reset();
                    shirtSelect.disabled = false; 
                    btn.innerHTML = 'ยืนยันการสมัครและส่งข้อมูล';
                    btn.disabled = false;
                    btn.classList.remove('opacity-70');
                })
                .catch(err => {
                    alert('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
                    btn.innerHTML = 'ยืนยันการสมัครและส่งข้อมูล';
                    btn.disabled = false;
                    btn.classList.remove('opacity-70');
                });
            };
            
            if(file) {
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
